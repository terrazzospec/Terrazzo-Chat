<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111110">
<title>Terrazzo Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111110;--s1:#1c1c1a;--s2:#252522;--s3:#2e2e2a;
  --acc:#d4a843;--txt:#f0ede4;--txt2:#9a9890;--txt3:#5a5a55;
  --brd:#333330;--brd2:#444440;--red:#c0392b;--grn:#4caf72;
  --r:12px;--rr:20px;--nav:56px;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb);overflow:hidden;font-size:15px}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300}
#splash.hide{display:none}
.splash-logo{font-family:var(--fh);font-size:2.8rem;font-weight:800;color:var(--acc);letter-spacing:-2px}
.splash-sub{color:var(--txt3);font-size:.72rem;letter-spacing:2.5px;font-family:var(--fm)}
.splash-spinner{width:28px;height:28px;border:2.5px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-top:8px}
.splash-err{color:#e07070;font-size:.82rem;text-align:center;max-width:260px;line-height:1.5}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:2rem;z-index:200;overflow-y:auto}
#auth.show{display:flex}
.auth-logo{font-family:var(--fh);font-size:2.4rem;font-weight:800;color:var(--acc);letter-spacing:-2px;margin-bottom:.15rem}
.auth-sub{color:var(--txt3);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2.5rem;font-family:var(--fm)}
.auth-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--rr);padding:1.4rem;width:100%;max-width:320px;display:flex;flex-direction:column;gap:11px}
.auth-card h2{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--txt)}
select,input[type=password],input[type=text],input[type=color],input[type=url],textarea{background:var(--s2);border:1px solid var(--brd);color:var(--txt);border-radius:9px;padding:10px 13px;font-size:.88rem;font-family:var(--fb);outline:none;width:100%;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--s2)}
.btn{background:var(--acc);color:#111;border:none;border-radius:9px;padding:11px;font-size:.88rem;font-weight:500;font-family:var(--fb);cursor:pointer;transition:background .15s,transform .1s;width:100%}
.btn:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--brd);border-radius:9px;padding:8px 13px;font-size:.83rem;font-family:var(--fb);cursor:pointer;transition:background .15s}
.btn-ghost:hover{background:var(--s3);color:var(--txt)}
.err-msg{color:#e07070;font-size:.75rem;text-align:center;min-height:15px}

/* SHELL */
#shell{display:none;width:100vw;overflow:hidden}

/* DESKTOP */
@media(min-width:641px){
  #shell{height:100vh;height:100dvh;flex-direction:row}
  #shell.on{display:flex}
  #sidebar{width:68px;background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;flex-shrink:0;transition:width .22s;overflow:hidden;z-index:10}
  #sidebar:hover{width:230px}
  .sb-logo{font-family:var(--fh);font-size:1.1rem;font-weight:800;color:var(--acc);padding:5px 0 9px;white-space:nowrap;width:100%;text-align:center;flex-shrink:0}
  .sb-section{font-size:.58rem;font-family:var(--fm);color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;padding:7px 0 3px 14px;width:100%;opacity:0;transition:opacity .2s;white-space:nowrap;overflow:hidden;flex-shrink:0}
  #sidebar:hover .sb-section{opacity:1}
  .sb-btn{width:100%;display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:9px;cursor:pointer;background:none;border:none;color:var(--txt2);font-family:var(--fb);font-size:.82rem;transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;flex-shrink:0}
  .sb-btn:hover{background:var(--s2);color:var(--txt)}
  .sb-btn.active{background:var(--s3);color:var(--acc)}
  .sb-icon{font-size:1.05rem;flex-shrink:0;width:22px;text-align:center}
  .sb-label{opacity:0;transition:opacity .2s;flex:1;overflow:hidden;text-overflow:ellipsis}
  #sidebar:hover .sb-label{opacity:1}
  .sb-badge{background:var(--acc);color:#111;border-radius:10px;font-size:.56rem;font-weight:700;font-family:var(--fm);padding:1px 5px;margin-left:auto;flex-shrink:0;display:none}
  .sb-badge.show{display:block}
  #sidebar:hover .sb-badge{display:block}
  .sb-div{width:34px;height:1px;background:var(--brd);flex-shrink:0;margin:3px 0}
  #sidebar:hover .sb-div{width:calc(100% - 22px)}
  .sb-user{margin-top:auto;width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--brd);overflow:hidden;flex-shrink:0}
  .sb-uinfo{opacity:0;transition:opacity .2s;flex:1;min-width:0}
  #sidebar:hover .sb-uinfo{opacity:1}
  .sb-uname{font-size:.82rem;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-urole{font-size:.63rem;color:var(--txt3);font-family:var(--fm)}
  .logout-sb{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:.82rem;padding:3px;flex-shrink:0;opacity:0;transition:opacity .2s}
  #sidebar:hover .logout-sb{opacity:1}
  #main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;height:100%}
  .view{display:none;flex-direction:column;flex:1;overflow:hidden;height:100%}
  .view.active{display:flex}
  #view-home,#view-admin,#view-settings{overflow-y:auto;padding:1.4rem;gap:.9rem}
  #panel{width:0;background:var(--s1);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;flex-shrink:0}
  #panel.open{width:250px}
}

/* MOBILE */
@media(max-width:640px){
  #shell{height:100vh;height:100dvh;flex-direction:column}
  #shell.on{display:flex}
  #sidebar{order:2;width:100%;height:var(--nav);background:var(--s1);border-top:1px solid var(--brd);display:flex;flex-direction:row;align-items:stretch;flex-shrink:0;z-index:50}
  .sb-logo,.sb-section,.sb-div,.sb-user{display:none!important}
  .sb-badge{display:none}
  .sb-badge.show{display:block;position:absolute;top:5px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--acc);padding:0;font-size:0}
  .sb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 2px;border-radius:0;cursor:pointer;background:none;border:none;color:var(--txt3);font-family:var(--fb);font-size:.5rem;position:relative}
  .sb-btn.active{color:var(--acc)}
  .sb-icon{font-size:1.05rem;width:auto}
  .sb-label{display:block!important;opacity:1!important}
  #main{order:1;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .view{display:none;flex-direction:column;flex:1;overflow:hidden}
  .view.active{display:flex}
  #view-home,#view-admin,#view-settings{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.9rem;gap:.8rem}
  #view-chat{display:none;flex-direction:column;flex:1;min-height:0}
  #view-chat.active{display:flex}
  #messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .typing-row{flex-shrink:0;min-height:18px}
  .composer{flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
  #panel{position:fixed;top:0;left:0;right:0;bottom:var(--nav);background:var(--s1);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .22s ease}
  #panel.open{transform:translateX(0)}
  .msg-wrap{max-width:82%}
}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SHARED */
.chat-hdr{background:var(--s1);border-bottom:1px solid var(--brd);padding:10px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0}
.chat-back{background:none;border:none;color:var(--txt2);font-size:1.3rem;cursor:pointer;padding:1px 5px;border-radius:7px;line-height:1}
.chat-hdr-info{flex:1;min-width:0}
.chat-hdr-name{font-size:.92rem;font-weight:500;color:var(--txt);font-family:var(--fh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-hdr-sub{font-size:.63rem;color:var(--txt3);font-family:var(--fm)}
.icon-btn{background:none;border:none;color:var(--txt2);cursor:pointer;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .15s;font-size:.88rem}
.icon-btn:hover{background:var(--s2);color:var(--txt)}

/* CHAT TABS */
.chat-tabs{display:flex;border-bottom:1px solid var(--brd);background:var(--s1);flex-shrink:0}
.chat-tab{flex:1;padding:9px 6px 8px;font-size:.78rem;font-family:var(--fb);background:none;border:none;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.chat-tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* MESSAGES */
#messages{padding:8px 10px;display:flex;flex-direction:column;gap:1px}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
.msg-date-sep{text-align:center;font-size:.62rem;color:var(--txt3);font-family:var(--fm);padding:8px 0 3px;letter-spacing:.5px}
.msg-row{display:flex;align-items:flex-end;gap:6px;padding:1px 0;margin-bottom:2px}
.msg-row.own{flex-direction:row-reverse}
.msg-av{width:24px;height:24px;border-radius:50%;background:var(--s3);color:var(--acc);font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fh)}
.msg-av.hidden{visibility:hidden}
.msg-wrap{display:flex;flex-direction:column;max-width:70%;gap:1px}
.msg-row.own .msg-wrap{align-items:flex-end}
.msg-sender-name{font-size:.62rem;color:var(--txt3);padding:0 9px 1px;font-family:var(--fm)}
.msg-bubble{background:var(--s2);border-radius:15px;padding:7px 11px;font-size:.86rem;line-height:1.5;color:var(--txt);word-break:break-word;white-space:pre-wrap;border:1px solid var(--brd);border-bottom-left-radius:4px}
.msg-row.own .msg-bubble{background:var(--acc);color:#111;border-color:transparent;border-bottom-right-radius:4px;border-bottom-left-radius:15px}
.msg-bubble img{max-width:100%;border-radius:9px;display:block;margin-top:4px;max-height:200px;object-fit:cover;cursor:pointer}
.msg-file{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.18);border-radius:7px;padding:6px 8px;margin-top:3px;cursor:pointer}
.msg-fname{font-size:.74rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.msg-fsize{font-size:.62rem;opacity:.55;font-family:var(--fm)}
.msg-time{font-size:.58rem;color:var(--txt3);padding:1px 9px;font-family:var(--fm)}
.msg-row.own .msg-time{text-align:right}
.sys-msg{text-align:center;font-size:.67rem;color:var(--txt3);font-style:italic;padding:3px 0 6px;font-family:var(--fm)}
.typing-row{display:flex;align-items:center;gap:6px;padding:2px 10px 3px;color:var(--txt3);font-size:.7rem;font-style:italic}
.dots span{width:4px;height:4px;background:var(--txt3);border-radius:50%;display:inline-block;animation:blink 1.2s infinite;margin:0 1px}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* COMPOSER */
.composer{background:var(--s1);border-top:1px solid var(--brd);padding:7px 9px}
#file-preview{display:none;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.pv-item{position:relative;border-radius:7px;overflow:hidden;border:1px solid var(--brd)}
.pv-item img{width:52px;height:52px;object-fit:cover;display:block}
.pv-file-box{padding:5px 7px;background:var(--s2);min-width:65px;max-width:90px}
.pv-fname{font-size:.6rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-fsize{font-size:.56rem;color:var(--txt3);font-family:var(--fm)}
.pv-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.72);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.composer-row{display:flex;align-items:flex-end;gap:6px}
.att-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--brd);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;flex-shrink:0;transition:background .15s}
.att-btn:hover{background:var(--s3);color:var(--txt)}
#compose-input{flex:1;background:var(--s2);border:1px solid var(--brd);border-radius:17px;padding:7px 12px;color:var(--txt);font-family:var(--fb);font-size:.86rem;resize:none;outline:none;max-height:85px;min-height:34px;line-height:1.4;overflow-y:auto;transition:border-color .2s}
#compose-input:focus{border-color:var(--acc)}
#compose-input::placeholder{color:var(--txt3)}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--acc);border:none;color:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;flex-shrink:0;transition:transform .1s}
.send-btn:active{transform:scale(.95)}
#fi-img,#fi-doc{display:none}

/* HANDLINGAR */
#handlingar-view{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;-webkit-overflow-scrolling:touch}
.hand-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--txt3);padding:2rem;text-align:center}
.hand-empty-icon{font-size:2rem;opacity:.4}
.hand-empty p{font-size:.82rem;line-height:1.5}
.hand-file-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .15s;text-decoration:none}
.hand-file-row:hover{background:var(--s2)}
.hand-file-icon{font-size:1.3rem;flex-shrink:0}
.hand-file-info{flex:1;min-width:0}
.hand-file-name{font-size:.85rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hand-file-meta{font-size:.68rem;color:var(--txt3);font-family:var(--fm);margin-top:2px}
.hand-file-arrow{color:var(--txt3);font-size:.85rem;flex-shrink:0}
.hand-header{padding:12px 14px 8px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.hand-header p{font-size:.72rem;color:var(--txt3);flex:1}
.hand-refresh{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:7px;transition:background .15s}
.hand-refresh:hover{background:var(--s2);color:var(--txt)}
.hand-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:2rem;color:var(--txt3);font-size:.8rem}

/* HOME */
.home-hdr{font-family:var(--fh);font-size:1.6rem;font-weight:800;color:var(--txt);letter-spacing:-1px}
.home-sub{color:var(--txt2);font-size:.82rem}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;margin-top:.2rem}
.proj-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:12px;cursor:pointer;transition:background .15s,border-color .15s;display:flex;flex-direction:column;gap:6px}
.proj-card:hover{background:var(--s2);border-color:var(--brd2)}
.proj-icon{font-size:1.35rem}
.proj-name{font-size:.86rem;font-weight:500;color:var(--txt)}
.proj-meta{font-size:.67rem;color:var(--txt3);font-family:var(--fm)}
.unread-dot{display:inline-block;background:var(--acc);color:#111;border-radius:10px;font-size:.58rem;font-weight:700;font-family:var(--fm);padding:1px 6px;width:fit-content}
.new-proj-card{background:transparent;border:1px dashed var(--brd2);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--txt3);font-size:.82rem;min-height:92px}
.new-proj-card:hover{background:var(--s1);border-color:var(--acc);color:var(--acc)}

/* ADMIN/SETTINGS */
.admin-sec,.settings-sec{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:1rem;display:flex;flex-direction:column;gap:8px}
.admin-sec h3,.settings-sec h3{font-family:var(--fh);font-size:.9rem;font-weight:700;color:var(--txt)}
.u-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--brd)}
.u-row:last-child{border-bottom:none}
.role-badge{font-size:.58rem;font-family:var(--fm);padding:2px 6px;border-radius:10px;background:var(--s3);color:var(--txt2);white-space:nowrap;flex-shrink:0}
.role-badge.admin{background:rgba(212,168,67,.15);color:var(--acc)}
.row-acts{margin-left:auto;display:flex;gap:3px;flex-shrink:0}
.btn-sm{background:transparent;color:var(--txt2);border:1px solid var(--brd);border-radius:6px;padding:3px 7px;font-size:.67rem;font-family:var(--fb);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-sm:hover{background:var(--s3);color:var(--txt)}
.btn-sm.danger{color:#e07070;border-color:rgba(192,57,43,.3)}
.btn-sm.danger:hover{background:rgba(192,57,43,.12)}
.btn-sm.success{color:#6dcc8a;border-color:rgba(76,175,114,.3)}
.btn-sm.success:hover{background:rgba(76,175,114,.1)}
.setting-row{display:flex;flex-direction:column;gap:4px}
.setting-label{font-size:.64rem;color:var(--txt2);font-family:var(--fm);letter-spacing:.5px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--brd2);border-radius:var(--rr);padding:1.3rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:11px;animation:mIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-family:var(--fh);font-size:1.1rem;font-weight:800;color:var(--txt)}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:3px;flex-wrap:wrap}
.field-label{font-size:.64rem;color:var(--txt2);font-family:var(--fm);margin-bottom:2px;letter-spacing:.5px}
.member-list{display:flex;flex-direction:column;gap:3px;max-height:175px;overflow-y:auto}
.mem-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;background:var(--s2);border:1px solid var(--brd)}
.mem-item input[type=checkbox]{accent-color:var(--acc);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.mem-item label{flex:1;font-size:.8rem;cursor:pointer;color:var(--txt)}
.mem-item .mrole{font-size:.62rem;color:var(--txt3);font-family:var(--fm)}
.onedrive-hint{font-size:.72rem;color:var(--txt3);line-height:1.5;background:var(--s2);border-radius:8px;padding:8px 10px;border:1px solid var(--brd)}

/* PANEL */
.panel-hdr{padding:11px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hdr h3{font-family:var(--fh);font-size:.9rem;font-weight:700;color:var(--txt)}
.panel-body{flex:1;overflow-y:auto;padding:10px 13px;display:flex;flex-direction:column;gap:9px}
.panel-sec{display:flex;flex-direction:column;gap:6px}
.panel-sec-title{font-size:.62rem;font-family:var(--fm);color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
.mem-entry{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--brd)}
.mem-entry:last-child{border-bottom:none}
.me-name{font-size:.8rem;color:var(--txt);flex:1}
.me-role{font-size:.62rem;color:var(--txt3);font-family:var(--fm)}
.kick-btn{background:none;border:none;color:var(--txt3);cursor:pointer;padding:3px;border-radius:5px;font-size:.78rem;transition:color .15s}
.kick-btn:hover{color:var(--red)}

/* IMAGE VIEWER */
#img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:600;display:none;align-items:center;justify-content:center;cursor:zoom-out}
#img-viewer.open{display:flex}
#img-viewer img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}

/* AVATAR */
.avatar{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#111;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fh)}

/* TOAST */
#toast{position:fixed;bottom:66px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--grn);color:#fff;padding:6px 15px;border-radius:20px;font-size:.77rem;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red)}

/* EXPORT */
#export-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:700;display:none;align-items:center;justify-content:center;flex-direction:column;gap:13px;backdrop-filter:blur(4px)}
#export-overlay.open{display:flex}
#export-overlay p{color:var(--txt);font-size:.86rem;font-family:var(--fm)}
.spinner{width:30px;height:30px;border:2.5px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo" id="splash-logo">Terrazzo Chat</div>
  <div class="splash-sub" id="splash-sub">TERRAZZOSPECIALISTEN</div>
  <div class="splash-spinner" id="splash-spin"></div>
  <div class="splash-err" id="splash-err" style="display:none"></div>
  <button class="btn" id="splash-retry" style="display:none;max-width:200px;margin-top:8px" onclick="location.reload()">Försök igen</button>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-logo" id="app-logo">Terrazzo Chat</div>
  <div class="auth-sub" id="app-sub">TERRAZZOSPECIALISTEN</div>
  <div class="auth-card">
    <h2>Logga in</h2>
    <select id="sel-user"><option value="">Välj ditt namn...</option></select>
    <input type="password" id="sel-pin" placeholder="PIN-kod (standard: 0000)" maxlength="4" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err-msg" id="auth-err"></div>
    <button class="btn" onclick="doLogin()">Logga in</button>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div id="sidebar">
    <div class="sb-logo" id="sb-logo-txt">TC</div>
    <button class="sb-btn active" id="sb-home" onclick="showView('home')">
      <span class="sb-icon">🏠</span><span class="sb-label">Hem</span>
    </button>
    <div class="sb-section">PROJEKT</div>
    <div id="sb-projects" style="display:contents"></div>
    <div class="sb-div"></div>
    <button class="sb-btn" id="sb-admin" onclick="showView('admin')" style="display:none">
      <span class="sb-icon">⚙️</span><span class="sb-label">Admin</span>
    </button>
    <button class="sb-btn" id="sb-settings" onclick="showView('settings')" style="display:none">
      <span class="sb-icon">🎨</span><span class="sb-label">Design</span>
    </button>
    <div class="sb-user">
      <div class="sb-uinfo">
        <div class="sb-uname" id="sb-uname">–</div>
        <div class="sb-urole" id="sb-urole">–</div>
      </div>
      <button class="logout-sb" onclick="doLogout()">↩</button>
    </div>
  </div>

  <div id="main">
    <!-- HOME -->
    <div class="view active" id="view-home">
      <div class="home-hdr" id="home-hdr">Hej!</div>
      <div class="home-sub">Välj ett projekt eller skapa ett nytt</div>
      <div class="home-grid" id="home-grid"></div>
    </div>

    <!-- CHAT -->
    <div class="view" id="view-chat">
      <div class="chat-hdr">
        <button class="chat-back" onclick="showView('home')">‹</button>
        <div class="chat-hdr-info">
          <div class="chat-hdr-name" id="ch-name">–</div>
          <div class="chat-hdr-sub" id="ch-sub">–</div>
        </div>
        <button class="icon-btn" onclick="togglePanel()">👥</button>
      </div>
      <!-- TABS -->
      <div class="chat-tabs">
        <button class="chat-tab active" id="tab-chat" onclick="switchTab('chat')">💬 Chatt</button>
        <button class="chat-tab" id="tab-hand" onclick="switchTab('hand')">📁 Handlingar</button>
      </div>
      <!-- CHAT CONTENT -->
      <div id="chat-content" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
        <div id="messages" style="flex:1;min-height:0;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:1px;-webkit-overflow-scrolling:touch"></div>
        <div class="typing-row" id="typing-row"></div>
        <div class="composer">
          <div id="file-preview"></div>
          <div class="composer-row">
            <label class="att-btn" for="fi-img">📷</label>
            <input type="file" id="fi-img" accept="image/*" multiple onchange="handleFiles(this,'img')">
            <label class="att-btn" for="fi-doc">📎</label>
            <input type="file" id="fi-doc" multiple onchange="handleFiles(this,'doc')">
            <textarea id="compose-input" placeholder="Skriv ett meddelande..." rows="1"
              oninput="autoResize(this);onTyping()" onkeydown="composeKey(event)"></textarea>
            <button class="send-btn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>
      <!-- HANDLINGAR CONTENT -->
      <div id="hand-content" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
        <div id="handlingar-view"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="view" id="view-admin">
      <div style="font-family:var(--fh);font-size:1.35rem;font-weight:800">Administration</div>
      <div class="admin-sec"><h3>👥 Användare</h3><div id="admin-users"></div></div>
      <div class="admin-sec"><h3>📁 Projekt</h3><div id="admin-projects"></div></div>
    </div>

    <!-- SETTINGS -->
    <div class="view" id="view-settings">
      <div style="font-family:var(--fh);font-size:1.35rem;font-weight:800">Inställningar</div>
      <div class="settings-sec">
        <h3>🎨 Utseende</h3>
        <div class="setting-row"><div class="setting-label">APPNAMN</div><input type="text" id="set-appname" placeholder="Terrazzo Chat" maxlength="30"></div>
        <div class="setting-row"><div class="setting-label">FÖRETAGSNAMN</div><input type="text" id="set-company" placeholder="TERRAZZOSPECIALISTEN" maxlength="40"></div>
        <div class="setting-row"><div class="setting-label">ACCENTFÄRG</div>
          <div style="display:flex;gap:7px;align-items:center">
            <input type="color" id="set-color" value="#d4a843" style="width:38px;height:32px;padding:2px;border-radius:7px;cursor:pointer;flex-shrink:0">
            <input type="text" id="set-color-hex" placeholder="#d4a843" maxlength="7" style="flex:1">
          </div>
        </div>
        <button class="btn" onclick="saveSettings()">Spara</button>
      </div>
      <div class="settings-sec">
        <h3>👤 Lägg till användare</h3>
        <div class="setting-row"><div class="setting-label">NAMN</div><input type="text" id="set-newuser" placeholder="Förnamn" maxlength="30"></div>
        <button class="btn" onclick="addUser()">Lägg till (PIN: 0000)</button>
      </div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div class="panel-hdr"><h3 id="panel-title">Info</h3><button class="icon-btn" onclick="togglePanel()">✕</button></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<div id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div id="img-viewer" onclick="closeImg()"><img id="iv-img" src="" alt=""></div>
<div id="export-overlay"><div class="spinner"></div><p id="export-status">Förbereder...</p></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,push,onValue,off,update,remove,onDisconnect}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC={apiKey:"AIzaSyDuhaeRJZnRa0dn_8KidlZZZ2mudLCfA20",authDomain:"terrazzospecialisten-8127c.firebaseapp.com",databaseURL:"https://terrazzospecialisten-8127c-default-rtdb.europe-west1.firebasedatabase.app",projectId:"terrazzospecialisten-8127c",storageBucket:"terrazzospecialisten-8127c.firebasestorage.app",messagingSenderId:"80969810531",appId:"1:80969810531:web:5b541c11843ec8f34bee56"};
const db=getDatabase(initializeApp(FC));

// ── STATE ──
const DU={Jesper:{pin:'0000',role:'admin'},Ronny:{pin:'0000',role:'admin'},Maria:{pin:'0000',role:'member'},Ian:{pin:'0000',role:'member'},Darren:{pin:'0000',role:'member'},Latif:{pin:'0000',role:'member'},Anders:{pin:'0000',role:'member'},Robin:{pin:'0000',role:'member'},Ola:{pin:'0000',role:'member'},Mahdi:{pin:'0000',role:'member'},Ervis:{pin:'0000',role:'member'},Mikael:{pin:'0000',role:'member'}};
let UR={...DU},projects={},settings={name:'Terrazzo Chat',company:'TERRAZZOSPECIALISTEN',color:'#d4a843'};
let CU=null,CPid=null,PF=[],panelOpen=false,msgUnsub=null,typT=null,reads={};
let currentTab='chat'; // 'chat' or 'hand'

function isAdmin(n){return(UR[n]?.role||DU[n]?.role||'member')==='admin';}
function canManage(p){return isAdmin(CU)||p.creator===CU;}

// ── USER SELECT ──
function popSel(){
  const s=document.getElementById('sel-user'),v=s.value;
  s.innerHTML='<option value="">Välj ditt namn...</option>';
  [...new Set([...Object.keys(DU),...Object.keys(UR)])].sort().forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u;s.appendChild(o);});
  if(v)s.value=v;
}

// ── SPLASH + FAST BOOT ──
function showSplashErr(msg){
  document.getElementById('splash-spin').style.display='none';
  document.getElementById('splash-err').style.display='block';
  document.getElementById('splash-err').textContent=msg;
  document.getElementById('splash-retry').style.display='block';
}

// Pre-connect: start Firebase listeners immediately in background
let settingsLoaded=false,usersLoaded=false;
onValue(ref(db,'settings'),snap=>{
  if(snap.exists())Object.assign(settings,snap.val());
  settingsLoaded=true;
  applySettings();
  checkReady();
});
onValue(ref(db,'users'),snap=>{
  if(snap.exists())Object.assign(UR,snap.val());
  usersLoaded=true;
  popSel();
  checkReady();
});

const connTimeout=setTimeout(()=>{
  if(!settingsLoaded||!usersLoaded){
    showSplashErr('Ingen anslutning till servern.\nKontrollera nätet och försök igen.');
  }
},7000);

function checkReady(){
  if(!settingsLoaded||!usersLoaded)return;
  clearTimeout(connTimeout);
  // Apply settings to splash
  document.getElementById('splash-logo').textContent=settings.name;
  document.getElementById('splash-sub').textContent=settings.company;
  // Check persistent login
  const saved=localStorage.getItem('tc_user');
  if(saved&&(DU[saved]||UR[saved])){
    CU=saved;
    // Short delay so splash shows briefly
    setTimeout(()=>{
      hideSplash();
      bootApp();
    },400);
  } else {
    hideSplash();
    showAuth();
  }
}

function hideSplash(){document.getElementById('splash').classList.add('hide');}
function showAuth(){document.getElementById('auth').classList.add('show');applySettings();}

function applySettings(){
  document.title=settings.name;
  const L=document.getElementById('app-logo');if(L)L.textContent=settings.name;
  const S=document.getElementById('app-sub');if(S)S.textContent=settings.company;
  const SL=document.getElementById('sb-logo-txt');if(SL)SL.textContent=settings.name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  document.documentElement.style.setProperty('--acc',settings.color||'#d4a843');
  const ci=document.getElementById('set-color');if(ci)ci.value=settings.color||'#d4a843';
  const ch=document.getElementById('set-color-hex');if(ch)ch.value=settings.color||'#d4a843';
  const an=document.getElementById('set-appname');if(an)an.value=settings.name;
  const co=document.getElementById('set-company');if(co)co.value=settings.company;
}

// ── AUTH ──
window.doLogin=async function(){
  const name=document.getElementById('sel-user').value,pin=document.getElementById('sel-pin').value;
  const err=document.getElementById('auth-err');
  if(!name){err.textContent='Välj ditt namn.';return;}
  const u=UR[name]||DU[name];
  if(!u||pin!==(u.pin||'0000')){err.textContent='Fel PIN. Standard är 0000.';return;}
  err.textContent='';
  CU=name;localStorage.setItem('tc_user',name);
  try{
    const pr=ref(db,`presence/${name}`);
    await set(pr,{online:true,ts:Date.now()});
    onDisconnect(pr).set({online:false,ts:Date.now()});
  }catch(e){}
  document.getElementById('auth').classList.remove('show');
  bootApp();
};

window.doLogout=function(){
  if(CU)set(ref(db,`presence/${CU}`),{online:false,ts:Date.now()}).catch(()=>{});
  if(msgUnsub){msgUnsub();msgUnsub=null;}
  CU=null;CPid=null;PF=[];localStorage.removeItem('tc_user');
  document.getElementById('shell').classList.remove('on');
  document.getElementById('auth').classList.add('show');
  document.getElementById('sel-pin').value='';
  document.getElementById('auth-err').textContent='';
};

function bootApp(){
  document.getElementById('shell').classList.add('on');
  document.getElementById('sb-uname').textContent=CU;
  document.getElementById('sb-urole').textContent=isAdmin(CU)?'Admin':'Medlem';
  document.getElementById('home-hdr').textContent=`Hej, ${CU}! 👋`;
  document.getElementById('sb-admin').style.display=isAdmin(CU)?'':'none';
  document.getElementById('sb-settings').style.display=isAdmin(CU)?'':'none';
  listenProjects();
  listenReads();
  showView('home');
}

// ── PROJECTS ──
function listenProjects(){
  onValue(ref(db,'projects'),snap=>{
    projects={};if(snap.exists())snap.forEach(c=>{projects[c.key]={...c.val(),id:c.key};});
    renderSidebar();
    const vh=document.getElementById('view-home');if(vh.classList.contains('active'))renderHome();
    const va=document.getElementById('view-admin');if(va.classList.contains('active'))renderAdmin();
    if(CPid){
      const p=projects[CPid];
      if(p&&!(p.members||[]).includes(CU)){toast('Du har tagits bort','err');showView('home');}
      else if(p){document.getElementById('ch-sub').textContent=`${(p.members||[]).length} med`;}
    }
  });
}
function listenReads(){if(!CU)return;onValue(ref(db,`reads/${CU}`),snap=>{reads={};if(snap.exists())Object.assign(reads,snap.val());updateBadges();});}

// ── VIEWS ──
window.showView=function(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  const mp={home:'sb-home',admin:'sb-admin',settings:'sb-settings'};
  if(mp[v])document.getElementById(mp[v])?.classList.add('active');
  if(v==='home')renderHome();
  if(v==='admin')renderAdmin();
  if(v==='settings')applySettings();
  if(v!=='chat'){CPid=null;if(msgUnsub){msgUnsub();msgUnsub=null;}if(panelOpen)togglePanel();}
};

window.openProject=function(id){
  const p=projects[id];if(!p)return;
  if(!(p.members||[]).includes(CU)){toast('Du har inte tillgång','err');return;}
  if(msgUnsub){msgUnsub();msgUnsub=null;}
  CPid=id;currentTab='chat';
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-chat').classList.add('active');
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  const sb=document.getElementById('sb-proj-'+id);if(sb)sb.classList.add('active');
  document.getElementById('ch-name').textContent=`${p.icon||'💬'} ${p.name}`;
  document.getElementById('ch-sub').textContent=`${(p.members||[]).length} med`;
  switchTab('chat');
  markRead(id);
  listenMessages(id);
  listenTyping(id);
};

// ── TABS ──
window.switchTab=function(tab){
  currentTab=tab;
  document.getElementById('tab-chat').classList.toggle('active',tab==='chat');
  document.getElementById('tab-hand').classList.toggle('active',tab==='hand');
  document.getElementById('chat-content').style.display=tab==='chat'?'flex':'none';
  document.getElementById('hand-content').style.display=tab==='hand'?'flex':'none';
  if(tab==='hand')loadHandlingar();
};

// ── HANDLINGAR ──
function loadHandlingar(){
  const p=projects[CPid];if(!p)return;
  const view=document.getElementById('handlingar-view');

  if(!p.onedriveUrl){
    // Admin sees setup option, others see empty state
    if(canManage(p)){
      view.innerHTML=`<div class="hand-empty">
        <div class="hand-empty-icon">📁</div>
        <p>Inga handlingar kopplade ännu.</p>
        <button class="btn" style="max-width:220px;margin-top:8px" onclick="openOneDriveSetup('${p.id}')">Koppla OneDrive-mapp</button>
      </div>`;
    } else {
      view.innerHTML=`<div class="hand-empty"><div class="hand-empty-icon">📁</div><p>Inga handlingar tillgängliga ännu.</p></div>`;
    }
    return;
  }

  // Show loading
  view.innerHTML=`<div class="hand-loading"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div><span>Hämtar handlingar...</span></div>`;

  // Load files from OneDrive share link via oEmbed/graph
  // We use the share link directly — open files in browser
  loadOneDriveFiles(p.onedriveUrl, view, p);
}

async function loadOneDriveFiles(shareUrl, view, p){
  try{
    // Convert share URL to embed-friendly format
    // For OneDrive shared folders, we fetch the folder listing
    const encodedUrl = btoa(shareUrl).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const apiUrl = `https://api.onedrive.com/v1.0/shares/u!${encodedUrl}/root/children`;

    const res = await fetch(apiUrl);
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    if(!data.value||data.value.length===0){
      view.innerHTML=`<div class="hand-empty"><div class="hand-empty-icon">📂</div><p>Mappen är tom.</p></div>`;
      return;
    }

    const canAdmin = canManage(p);
    let html = `<div class="hand-header">
      <p>${data.value.length} fil${data.value.length!==1?'er':''}</p>
      ${canAdmin?`<button class="hand-refresh" onclick="loadHandlingar()">↻ Uppdatera</button><button class="hand-refresh" onclick="openOneDriveSetup('${p.id}')">✏️</button>`:`<button class="hand-refresh" onclick="loadHandlingar()">↻</button>`}
    </div>`;

    data.value.forEach(item=>{
      const icon = getFileIcon(item.name);
      const size = item.size ? fmtSize(item.size) : '';
      const modified = item.lastModifiedDateTime ? new Date(item.lastModifiedDateTime).toLocaleDateString('sv-SE') : '';
      const webUrl = item.webUrl||shareUrl;
      html+=`<a class="hand-file-row" href="${webUrl}" target="_blank" rel="noopener">
        <span class="hand-file-icon">${icon}</span>
        <div class="hand-file-info">
          <div class="hand-file-name">${esc(item.name)}</div>
          <div class="hand-file-meta">${size}${size&&modified?' · ':''}${modified}</div>
        </div>
        <span class="hand-file-arrow">›</span>
      </a>`;
    });

    view.innerHTML=html;

  }catch(e){
    // API failed — show direct link fallback
    const canAdmin=canManage(p);
    view.innerHTML=`<div class="hand-empty">
      <div class="hand-empty-icon">📁</div>
      <p>Tryck på knappen nedan för att öppna handlingarna i OneDrive.</p>
      <a href="${p.onedriveUrl}" target="_blank" rel="noopener" class="btn" style="max-width:220px;margin-top:8px;text-decoration:none;display:flex;align-items:center;justify-content:center">Öppna handlingar ›</a>
      ${canAdmin?`<button class="btn-ghost" style="max-width:220px;margin-top:6px" onclick="openOneDriveSetup('${p.id}')">Ändra länk</button>`:''}
    </div>`;
  }
}

function getFileIcon(name){
  const e=name.split('.').pop().toLowerCase();
  const m={pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',dwg:'📐',dxf:'📐',rvt:'🏗️',ifc:'🏗️',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',zip:'🗜️',mp4:'🎬',mp3:'🎵'};
  return m[e]||'📁';
}

window.openOneDriveSetup=function(pid){
  const p=projects[pid];if(!p)return;
  showModal(`<h2>Koppla OneDrive-mapp</h2>
    <div class="onedrive-hint">
      <strong>Så här gör du:</strong><br>
      1. Gå till OneDrive och navigera till projektmappen med handlingar<br>
      2. Högerklicka → <em>Dela</em> → välj <em>"Alla med länken kan visa"</em><br>
      3. Klicka <em>Kopiera länk</em><br>
      4. Klistra in länken nedan
    </div>
    <div><div class="field-label">ONEDRIVE-LÄNK</div>
    <input type="url" id="od-url" placeholder="https://terrazzospecialisten-my.sharepoint.com/..." value="${p.onedriveUrl||''}"></div>
    <div class="modal-acts">
      <button class="btn-ghost" onclick="closeModal()">Avbryt</button>
      ${p.onedriveUrl?`<button class="btn-sm danger" style="padding:8px 12px" onclick="removeOneDrive('${pid}')">Ta bort länk</button>`:''}
      <button class="btn" style="width:auto;padding:9px 18px" onclick="saveOneDrive('${pid}')">Spara</button>
    </div>`);
};

window.saveOneDrive=async function(pid){
  const url=document.getElementById('od-url').value.trim();
  if(!url){toast('Klistra in en OneDrive-länk','err');return;}
  await update(ref(db,`projects/${pid}`),{onedriveUrl:url});
  closeModal();toast('Handlingar kopplade!');
  if(currentTab==='hand')loadHandlingar();
};

window.removeOneDrive=async function(pid){
  if(!confirm('Ta bort OneDrive-kopplingen?'))return;
  await update(ref(db,`projects/${pid}`),{onedriveUrl:null});
  closeModal();toast('Länk borttagen');
  if(currentTab==='hand')loadHandlingar();
};

  const atBottom=cont.scrollHeight-cont.scrollTop-cont.clientHeight<120;
  let html='',ld='',la='',lt=0;
  msgs.forEach((m,i)=>{
    const d=fmtDate(m.ts);

    if(m.type==='system'){html+=`<div class="sys-msg">${esc(m.text||'')}</div>`;la='';lt=m.ts;return;}
    const own=m.author===CU,sa=m.author===la&&(m.ts-lt)<300000;

    html+=`<div class="msg-row ${own?'own':''}"><div class="msg-av${sa?' hidden':''}">${ini(m.author)}</div><div class="msg-wrap">${!sa&&!own?`<div class="msg-sender-name">${m.author}</div>`:''}<div class="msg-bubble">${m.text?esc(m.text):''}${renderAtts(m.attachments||[])}</div>${last?`<div class="msg-time">${fmtTime(m.ts)}</div>`:''}</div></div>`;

  });

  cont.querySelectorAll('.msg-bubble img').forEach(img=>img.onclick=()=>openImg(img.src));
  if(atBottom)cont.scrollTop=cont.scrollHeight;else cont.scrollTop=prev;

// ── CLOUDINARY CONFIG ──
const CL_CLOUD = 'dtiee88h6';
const CL_PRESET = 'terrazzo';

// ── FILES ──
window.handleFiles=function(input,ptype){
  Array.from(input.files).forEach(f=>{
    if(ptype==='img'){
      compressImage(f, compressed=>{
        const idx=PF.length;
        PF.push({name:f.name,ptype,data:compressed,url:null,size:fmtSize(f.size),uploading:true});
        renderPrev();
        uploadToCloudinary(compressed,f.name).then(url=>{
          PF[idx].url=url||null;
          PF[idx].uploading=false;
          renderPrev();
        });
      });
    } else {
      const r=new FileReader();
      r.onload=e=>{PF.push({name:f.name,ptype,data:e.target.result,size:fmtSize(f.size)});renderPrev();};
      r.readAsDataURL(f);
    }
  });
  input.value='';
};

function compressImage(file,cb){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let d=c.toDataURL('image/jpeg',0.7);
      if(d.length>500000)d=c.toDataURL('image/jpeg',0.5);
      if(d.length>500000)d=c.toDataURL('image/jpeg',0.3);
      cb(d);
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

async function uploadToCloudinary(base64,filename){
  try{
    const res0=await fetch(base64);
    const blob=await res0.blob();
    const fd=new FormData();
    fd.append('file',blob,filename);
    fd.append('upload_preset',CL_PRESET);
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`,{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok){console.error('Cloudinary:',data);return null;}
    return data.secure_url||null;
  }catch(e){console.error('Cloudinary error:',e);return null;}
}

window.exportProject=async function(pid){
  const p=projects[pid];if(!p)return;
  if(!canManage(p)){toast('Ingen behörighet','err');return;}
  const ov=document.getElementById('export-overlay'),st=document.getElementById('export-status');
  ov.classList.add('open');st.textContent='Hämtar meddelanden...';
  try{
    const snap=await new Promise(res=>onValue(ref(db,`projects/${pid}/messages`),res,{onlyOnce:true}));
    const msgs=[];if(snap.exists())snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
    const zip=new JSZip(),folder=zip.folder(p.name);
    const imgF=folder.folder('Bilder'),docF=folder.folder('Filer');
    let log=`PROJEKT: ${p.name}\nSKAPAD AV: ${p.creator}\nMEDLEMMAR: ${(p.members||[]).join(', ')}\nEXPORTERAD: ${new Date().toLocaleString('sv-SE')}\n${'─'.repeat(50)}\n\n`;
    let ic=0,dc=0;
    for(const m of msgs){
      if(m.type==='system'){log+=`[System] ${m.text}\n\n`;continue;}
      log+=`[${new Date(m.ts).toLocaleString('sv-SE')}] ${m.author}:\n`;
      if(m.text)log+=`  ${m.text}\n`;
      for(const a of(m.attachments||[])){
        if(a.type==='img'){ic++;const fn=`bild_${ic}_${a.name}`;log+=`  📷 [${fn}]\n`;const b64=a.data.split(',')[1];if(b64)imgF.file(fn,b64,{base64:true});}
        else{dc++;const fn=`fil_${dc}_${a.name}`;log+=`  📎 [${fn}]\n`;const b64=a.data.split(',')[1];if(b64)docF.file(fn,b64,{base64:true});}
      }
      log+='\n';
    }
    folder.file('konversation.txt',log);
    st.textContent=`Packar (${msgs.length} msg, ${ic} bilder, ${dc} filer)...`;
    const blob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`${p.name}_${new Date().toISOString().slice(0,10)}.zip`;a.click();
    URL.revokeObjectURL(url);
    ov.classList.remove('open');toast(`${p.name} exporterad!`);
  }catch(e){ov.classList.remove('open');toast('Export misslyckades','err');}
};

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
window.openImg=function(src){document.getElementById('iv-img').src=src;document.getElementById('img-viewer').classList.add('open');};
window.closeImg=function(){document.getElementById('img-viewer').classList.remove('open');};
window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,85)+'px';};
function ini(n){return n?n.slice(0,2).toUpperCase():'?';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){const d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return'Idag';const y=new Date(n);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'Igår';return d.toLocaleDateString('sv-SE',{day:'numeric',month:'long'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
window.toast=function(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=type?`show ${type}`:'show';setTimeout(()=>t.className='',2800);};

// Seed default projects
async function seedIfEmpty(){
  const snap=await new Promise(res=>onValue(ref(db,'projects'),res,{onlyOnce:true}));
  if(snap.exists())return;
  const defs=[{name:'Allmänt',icon:'💬',creator:'Jesper',members:Object.keys(DU)},{name:'Jobb & Projekt',icon:'🏗️',creator:'Jesper',members:['Jesper','Ronny','Maria','Ian']}];
  for(const p of defs){const r=push(ref(db,'projects'));await set(r,{...p,createdAt:Date.now(),lastMsg:Date.now()});await push(ref(db,`projects/${r.key}/messages`),{author:'System',text:`Välkommen till ${p.name}! 🎉`,ts:Date.now(),type:'system'});}
}
seedIfEmpty();
